services:
  nginx:
    build:
      context: .
      dockerfile: deploy/nginx/Dockerfile
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"
    networks:
      - edge
      - app_internal
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-smartbuild}:${POSTGRES_PASSWORD:-smartbuild}@db:5432/${POSTGRES_DB:-smartbuild}
      SECRET_KEY: ${SECRET_KEY:-smartbuild-local-secret}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      DEBUG: ${DEBUG:-False}
    command: >
      sh -c "python manage.py migrate --noinput
      && python manage.py seed_demo --noinput
      && gunicorn smartbuild.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 90"
    networks:
      - app_internal
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smartbuild}
      POSTGRES_USER: ${POSTGRES_USER:-smartbuild}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartbuild}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartbuild} -d ${POSTGRES_DB:-smartbuild}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - app_internal
    restart: unless-stopped

networks:
  edge: {}
  app_internal:
    internal: true

volumes:
  pg_data:
